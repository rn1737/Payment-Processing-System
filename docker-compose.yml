services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  api-gateway:
    build:
      context: ./payflow-parent/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - redis
      - postgres
      - mongo

  auth-service:
    build:
      context: ./payflow-parent/auth-service
    ports:
      - "8081:8081"
    depends_on:
      - kafka
      - redis
      - postgres
      - mongo

  wallet-service:
    build:
      context: ./payflow-parent/wallet-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
      - redis
      - postgres

  payment-service:
    build:
      context: ./payflow-parent/payment-service
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - redis

  transaction-service:
    build:
      context: ./payflow-parent/transaction-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - postgres
      - redis

  notification-service:
    build:
      context: ./payflow-parent/notification-service
    ports:
      - "8085:8085"
    depends_on:
      - kafka

